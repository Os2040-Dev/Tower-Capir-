<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sausage Jump - Juego (Alta Resolución)</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        
        /* El contenedor mide 400x600 en la pantalla del celular */
        #gameContainer { position: relative; width: 400px; height: 600px; }
        
        /* El canvas se adapta visualmente al contenedor, pero internamente tiene el doble de resolución */
        canvas { 
            width: 100%; 
            height: 100%; 
            background: #a2d2ff; 
            border-radius: 10px; 
            display: block; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            /* Forzar bordes limpios en CSS */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #score { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 50px; color: white; text-shadow: 3px 3px black; pointer-events: none; z-index: 5; }
        
        #powerUpIndicator {
            position: absolute;
            top: 85px;
            width: 100%;
            text-align: center;
            font-size: 18px;
            color: #f1c40f;
            text-shadow: 2px 2px black;
            pointer-events: none;
            z-index: 5;
            font-weight: bold;
        }

        #gameOverMenu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            color: white;
            border-radius: 10px;
        }
        #gameOverMenu h2 { font-size: 40px; color: #e74c3c; margin: 0; }
        #finalCoinsText { color: #ffc107; font-size: 1.2rem; margin-top: -5px; }
        #retryBtn, #backBtn {
            padding: 12px 25px; font-size: 18px; cursor: pointer;
            border: none; border-radius: 50px; font-weight: bold; transition: 0.3s; margin: 10px;
        }
        #retryBtn { background: #2ecc71; color: white; }
        #backBtn { background: #e94560; color: white; text-decoration: none; display: inline-block; text-align: center; }
        #retryBtn:hover, #backBtn:hover { transform: scale(1.1); filter: brightness(1.2); }
    </style>
</head>
<body>

    <audio id="bgMusicGame" src="Imagenes/Tower.mp3" loop></audio>

    <div id="gameContainer">
        <div id="score">0</div>
        <div id="powerUpIndicator"></div>
        
        <div id="gameOverMenu">
            <h2>¡HAS PERDIDO!</h2>
            <p id="finalScoreText">Puntaje: 0</p>
            <p id="finalCoinsText">Monedas Totales: 🪙 0</p>
            <button id="retryBtn">REINTENTAR</button>
            <a href="index.html" id="backBtn">MENÚ PRINCIPAL</a>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreUI = document.getElementById('score');
        const powerUpIndicator = document.getElementById('powerUpIndicator');
        const menu = document.getElementById('gameOverMenu');
        const finalScoreText = document.getElementById('finalScoreText');
        const finalCoinsText = document.getElementById('finalCoinsText');
        const retryBtn = document.getElementById('retryBtn');

        // RESOLUCIÓN INTERNA DUPLICADA (Garantiza nitidez HD en móviles)
        canvas.width = 800;
        canvas.height = 1200;

        let musicEnabled = localStorage.getItem('musicEnabled') !== 'false';
        let soundEnabled = localStorage.getItem('soundEnabled') !== 'false';

        const bgMusicGame = document.getElementById('bgMusicGame');
        const sndJump = new Audio('salto.mp3');
        const sndGameOver = new Audio('perder.mp3');
        const sndPowerUp = new Audio('Imagenes/moneda.mp3');

        function playSound(audio) {
            if (soundEnabled) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Audio bloqueado."));
            }
        }

        function startMusicGame() {
            if (musicEnabled && bgMusicGame.paused) {
                bgMusicGame.play().catch(e => console.log("Esperando interacción..."));
            }
        }

        const selectedSkin = localStorage.getItem('userSkin') || 'Lucha.png';
        const imgPlayer = new Image();
        imgPlayer.src = selectedSkin; 

        const imgShield = new Image();
        imgShield.src = 'Imagenes/Proteccion.png'; 

        const imgDouble = new Image();
        imgDouble.src = 'Imagenes/Soda x2.png'; 

        const blockSkinsSrc = ['Imagenes/Zanhoria.png', 'Imagenes/Madera.png', 'Imagenes/pierna de pollo.png', 'Imagenes/Paleta de Choco.png', 'Imagenes/pepino.png'];
        const blockImages = blockSkinsSrc.map(src => {
            const img = new Image();
            img.src = src;
            return img;
        });

        let score = 0;
        let gameState = "playing";
        let player, stack, incomingBlock, deadPlayer, cameraY;
        
        // Físicas adaptadas a la nueva altura interna de 1200px
        const gravity = 1.2;
        const jumpForce = -24;

        let activePowerUp = null; 
        let powerUpTimeLeft = 0;
        let powerUpTimerInterval = null;

        function initGame() {
            score = 0;
            scoreUI.innerText = score;
            gameState = "playing";
            cameraY = 0;
            menu.style.display = "none";
            
            activePowerUp = null;
            powerUpTimeLeft = 0;
            powerUpIndicator.innerText = "";
            if(powerUpTimerInterval) clearInterval(powerUpTimerInterval);
            
            // PERSONAJE GIGANTE: Ahora mide 130x160 (Antes era 50x60)
            player = { x: 335, y: 840, w: 130, h: 160, dy: 0, onGround: true, currentPlatformY: 1000, rotation: 0 };
            
            // BLOQUES GIGANTES: Ahora miden 320x100 (Antes eran 120x40)
            stack = [{ x: 240, y: 1000, w: 320, h: 100, img: blockImages[0], powerUp: null }];
            resetIncoming();

            startMusicGame();
        }

        function resetIncoming() {
            const side = Math.random() > 0.5 ? 'left' : 'right';
            const randomSkin = blockImages[Math.floor(Math.random() * blockImages.length)];
            
            let blockPowerType = null;
            if (Math.random() < 0.20) {
                blockPowerType = Math.random() > 0.5 ? 'shield' : 'doublePoints';
            }

            // Velocidad adaptada al espacio duplicado
            let calculatedSpeed = 6.0 + (score * 0.16); 
            
            incomingBlock = {
                side: side,
                w: 320, h: 100,
                x: (side === 'left' ? -320 : 800),
                y: stack[stack.length - 1].y - 100,
                speed: calculatedSpeed * (side === 'left' ? 1 : -1),
                img: randomSkin,
                powerUp: blockPowerType 
            };
        }

        function activatePowerUp(type) {
            activePowerUp = type;
            if (powerUpTimerInterval) clearInterval(powerUpTimerInterval);

            playSound(sndPowerUp);

            if (type === 'shield') {
                powerUpTimeLeft = 10;
                powerUpIndicator.style.color = "#3498db";
                powerUpIndicator.innerText = "🛡️ VIDA EXTRA: " + powerUpTimeLeft + "s";
            } else if (type === 'doublePoints') {
                powerUpTimeLeft = 8;
                powerUpIndicator.style.color = "#f1c40f";
                powerUpIndicator.innerText = "⭐ DOBLE PUNTOS: " + powerUpTimeLeft + "s";
            }

            powerUpTimerInterval = setInterval(() => {
                powerUpTimeLeft--;
                if (powerUpTimeLeft <= 0) {
                    clearInterval(powerUpTimerInterval);
                    activePowerUp = null;
                    powerUpIndicator.innerText = "";
                } else {
                    if (activePowerUp === 'shield') {
                        powerUpIndicator.innerText = "🛡️ VIDA EXTRA: " + powerUpTimeLeft + "s";
                    } else if (activePowerUp === 'doublePoints') {
                        powerUpIndicator.innerText = "⭐ DOBLE PUNTOS: " + powerUpTimeLeft + "s";
                    }
                }
            }, 1000);
        }

        function handlePlayerDeath() {
            if (activePowerUp === 'shield') {
                activePowerUp = null; 
                powerUpIndicator.innerText = "";
                if (powerUpTimerInterval) clearInterval(powerUpTimerInterval);
                resetIncoming(); 
            } else {
                startDeath();
            }
        }

        function update() {
            if (gameState === "playing") {
                player.dy += gravity;
                player.y += player.dy;
                
                if (player.y + player.h > player.currentPlatformY) {
                    player.y = player.currentPlatformY - player.h;
                    player.dy = 0;
                    player.onGround = true;
                }

                incomingBlock.x += incomingBlock.speed;
                
                // Centrado exacto del bloque en la nueva resolución (800 / 2 - 320 / 2 = 240)
                const centerLimit = 240;
                const blockReached = (incomingBlock.side === 'left' && incomingBlock.x >= centerLimit) ||
                                     (incomingBlock.side === 'right' && incomingBlock.x <= centerLimit);

                if (blockReached) {
                    if (player.y + player.h <= incomingBlock.y + 40) {
                        incomingBlock.x = centerLimit;
                        stack.push({...incomingBlock});
                        player.currentPlatformY = incomingBlock.y;
                        
                        if (incomingBlock.powerUp) {
                            activatePowerUp(incomingBlock.powerUp);
                            stack[stack.length - 1].powerUp = null; 
                        }

                        let pointsToAdd = (activePowerUp === "doublePoints") ? 2 : 1;
                        score += pointsToAdd;
                        
                        scoreUI.innerText = score;
                        resetIncoming();
                    } else { 
                        handlePlayerDeath(); 
                    }
                }

                // Colisiones calibradas para los tamaños gigantes
                if (player.onGround && player.x < incomingBlock.x + 320 && player.x + player.w > incomingBlock.x && player.y + player.h > incomingBlock.y) {
                    handlePlayerDeath();
                }

                let targetCam = 600 - player.y;
                if (targetCam > cameraY) cameraY += (targetCam - cameraY) * 0.1;
            }

            if (gameState === "falling") {
                deadPlayer.x += deadPlayer.vx;
                deadPlayer.y += deadPlayer.vy;
                deadPlayer.vy += 1;
                deadPlayer.rotation += 0.12;
                if (deadPlayer.y + cameraY > canvas.height + 300) {
                    showMenu();
                }
            }
        }

        function startDeath() {
            gameState = "falling";
            bgMusicGame.pause();
            playSound(sndGameOver);
            deadPlayer = { x: player.x, y: player.y, vx: (incomingBlock.side === 'left' ? 10 : -10), vy: -24, rotation: 0 };
        }

        function showMenu() {
            gameState = "gameOver";
            
            let savedCoins = parseInt(localStorage.getItem('gameCoins')) || 0;
            savedCoins += score; 
            localStorage.setItem('gameCoins', savedCoins);

            finalScoreText.innerText = "Puntaje de ronda: " + score;
            finalCoinsText.innerText = "Monedas Totales: 🪙 " + savedCoins;
            menu.style.display = "flex";
            powerUpIndicator.innerText = "";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Forzar desactivación de suavizado nativo del Canvas 2D
            ctx.imageSmoothingEnabled = false;
            ctx.mozImageSmoothingEnabled = false;
            ctx.webkitImageSmoothingEnabled = false;
            ctx.msImageSmoothingEnabled = false;

            ctx.save();
            ctx.translate(0, cameraY);

            stack.forEach(b => {
                ctx.drawImage(b.img, b.x, b.y, b.w, b.h);
            });

            if (gameState === "playing") {
                ctx.drawImage(incomingBlock.img, incomingBlock.x, incomingBlock.y, incomingBlock.w, incomingBlock.h);
                
                if (incomingBlock.powerUp) {
                    let powerW = 70; 
                    let powerH = 70;
                    let powerX = incomingBlock.x + (incomingBlock.w / 2) - (powerW / 2);
                    let powerY = incomingBlock.y - powerH - 10; 

                    if (incomingBlock.powerUp === 'shield') {
                        ctx.drawImage(imgShield, powerX, powerY, powerW, powerH);
                    } else if (incomingBlock.powerUp === 'doublePoints') {
                        ctx.drawImage(imgDouble, powerX, powerY, powerW, powerH);
                    }
                }

                ctx.drawImage(imgPlayer, player.x, player.y, player.w, player.h);

                if (activePowerUp === 'shield') {
                    ctx.strokeStyle = "rgba(52, 152, 219, 0.8)";
                    ctx.lineWidth = 6;
                    ctx.strokeRect(player.x - 10, player.y - 10, player.w + 20, player.h + 20);
                }
            }

            if (gameState === "falling") {
                ctx.save();
                ctx.translate(deadPlayer.x + 65, deadPlayer.y + 80); 
                ctx.rotate(deadPlayer.rotation);
                ctx.drawImage(imgPlayer, -65, -80, 130, 160);
                ctx.restore();
            }

            ctx.restore();
            update();
            requestAnimationFrame(draw);
        }

        retryBtn.addEventListener('click', initGame);
        
        window.addEventListener('mousedown', () => {
            startMusicGame();
            if (gameState === "playing" && player.onGround) {
                player.dy = jumpForce;
                player.onGround = false;
                playSound(sndJump);
            }
        });

        imgPlayer.onload = () => { initGame(); draw(); };
    </script>
</body>
</html>
