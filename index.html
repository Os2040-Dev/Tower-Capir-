<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú - Sausage Jump</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --accent: #e94560;
            --success: #2ecc71;
            --gold: #ffc107;
        }

        body { 
            background: var(--bg-dark); 
            color: white; 
            height: 100vh;
            height: 100dvh;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
        }

        .title {
            font-size: 2.2rem;
            color: var(--gold);
            text-align: center;
            text-shadow: 3px 3px 0px #000;
            margin: 0;
            margin-top: 10px;
        }

        .coin-balance {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            padding: 4px 14px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            font-size: 1rem;
            color: var(--gold);
            text-shadow: 1px 1px black;
            z-index: 10;
        }

        .btn-settings {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            color: white;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            z-index: 10;
        }

        .main-layout {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .character-container {
            width: 100%;
            height: 45vh;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 25px rgba(233, 69, 96, 0.4));
        }

        #selected-skin-img {
            max-height: 100%;
            max-width: 85%;
            object-fit: contain;
        }

        .button-group-row {
            display: flex;
            gap: 15px;
            width: 85%;
            max-width: 320px;
        }

        .btn-menu-action {
            flex: 1;
            background: #16213e;
            color: white;
            padding: 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.4);
            text-align: center;
            transition: transform 0.1s;
            font-weight: bold;
        }
        .btn-menu-action:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
        
        .btn-shop-color { border: 2px solid var(--accent); }
        .btn-skins-color { border: 2px solid #3498db; }

        .btn-play {
            width: 85%;
            max-width: 320px;
            font-size: 1.8rem;
            border-radius: 50px;
            padding: 12px;
            background-color: var(--success);
            border: none;
            box-shadow: 0 6px 0 #27ae60;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .btn-play:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #27ae60;
        }

        .modal-content { background: #16213e; color: white; border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); }
        .modal-body { max-height: 55vh; overflow-y: auto; }
        
        .skin-card { 
            background: rgba(255,255,255,0.05); 
            border: 2px solid transparent; 
            border-radius: 10px; 
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 120px;
        }
        .skin-card img { max-height: 50px; object-fit: contain; }
        .skin-card.equipped { border-color: var(--success); background: rgba(46, 204, 113, 0.1); }
        .btn-action-skin { font-size: 0.7rem; padding: 4px 8px; font-weight: bold; border-radius: 5px; width: 100%; }

        .custom-alert {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: #c0392b;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            border: 2px solid #e74c3c;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 2000;
            font-size: 0.85rem;
            text-align: center;
            width: 85%;
            max-width: 340px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .custom-alert.show { transform: translateX(-50%) translateY(0); }

        /* Pantallas de Animaciones e Interrupciones */
        #unlock-screen, #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 26, 0.98);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .unlock-title { font-size: 2.2rem; color: var(--gold); text-shadow: 0 0 10px var(--gold); margin-bottom: 20px; animation: pulse 1.5s infinite alternate; }
        
        .unlock-glow-container {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }
        .unlock-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(241,196,15,0.6) 0%, rgba(241,196,15,0) 70%);
            animation: rotateGlow 6s linear infinite;
            z-index: 1;
        }
        #unlock-skin-img, #welcome-skin-img { max-height: 130px; object-fit: contain; z-index: 2; position: relative; filter: drop-shadow(0 0 15px #fff); }

        .form-check-input:checked { background-color: var(--success); border-color: var(--success); }

        @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <audio id="bgMusic" src="" loop></audio>
    <audio id="buySound" src="Imagenes/moneda.mp3"></audio>

    <button class="btn btn-settings" data-bs-toggle="modal" data-bs-target="#settingsModal">⚙️</button>
    <div class="coin-balance">🪙 <span id="menu-coins">0</span></div>
    
    <div id="errorAlert" class="custom-alert">⚠️ ¡No tienes suficientes monedas!<br>Sigue saltando para ganar más.</div>

    <div id="welcome-screen">
        <h2 class="unlock-title">¡BIENVENIDO!</h2>
        <p class="fs-5 text-white-50 max-width: 300px; mb-4">¡Hay una skin gratis para que empieces a jugar!</p>
        <div class="unlock-glow-container">
            <div class="unlock-glow"></div>
            <img src="Imagenes/Capir con Sueter.png" id="welcome-skin-img" alt="Skin de regalo">
        </div>
        <button class="btn btn-warning px-5 py-2 fs-5 rounded-pill font-weight-bold" onclick="claimWelcomeSkin()">🎁 RECLAMAR SKIN</button>
    </div>

    <div id="unlock-screen">
        <h2 class="unlock-title">¡DESBLOQUEADO!</h2>
        <div class="unlock-glow-container">
            <div class="unlock-glow"></div>
            <img src="Imagenes/Capir con Sueter.png" id="unlock-skin-img" alt="Skin Desbloqueada">
        </div>
        <button class="btn btn-success px-5 py-2 fs-5 rounded-pill" onclick="closeUnlockScreen()">¡GENIAL!</button>
    </div>

    <h1 class="title">Tower Capir</h1>

    <div class="main-layout">
        
        <div class="character-container">
            <img src="Imagenes/Capir con Sueter.png" id="selected-skin-img" alt="Skin actual">
        </div>

        <div class="button-group-row">
            <button class="btn btn-menu-action btn-shop-color" data-bs-toggle="modal" data-bs-target="#shopModal" onclick="renderShop()">
                🛒 TIENDA
            </button>
            <button class="btn btn-menu-action btn-skins-color" data-bs-toggle="modal" data-bs-target="#skinsModal" onclick="renderSkins()">
                👕 SKINS
            </button>
        </div>

        <button class="btn btn-success btn-play" onclick="goToGame()">¡JUGAR!</button>

    </div>

    <div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm p-3">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title w-100 text-center">⚙️ Ajustes</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body py-4">
                    <div class="form-check form-switch d-flex justify-content-between align-items-center p-0 mb-3">
                        <label class="form-check-label fs-5" for="musicSwitch">🎵 Música Fondo</label>
                        <input class="form-check-input fs-4 m-0" type="checkbox" id="musicSwitch" checked onchange="toggleMusic()">
                    </div>
                    <div class="form-check form-switch d-flex justify-content-between align-items-center p-0">
                        <label class="form-check-label fs-5" for="soundSwitch">🔊 Efectos de Sonido</label>
                        <input class="form-check-input fs-4 m-0" type="checkbox" id="soundSwitch" checked onchange="toggleSound()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="skinsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm p-3">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title w-100 text-center">👕 Mis Skins</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-2" id="my-skins-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="shopModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm p-3">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title w-100 text-center">🛒 Tienda</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-2" id="shop-items-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const gameSkins = [
            { id: 'Imagenes/Capir con Sueter.png', name: 'Sueter', price: 0 },
            { id: 'Imagenes/Capir Guardian.png', name: 'Guardian', price: 0 },
            { id: 'Imagenes/Capir Cheff.png', name: 'Cheff', price: 5 },
            { id: 'Imagenes/Capir Boom.png', name: 'Boom', price: 50 },
            { id: 'Imagenes/Capir espacial.png', name: 'Espacial', price: 5 },
            { id: 'Imagenes/Capir Albitro.png', name: 'Albitro', price: 50 },
            { id: 'Imagenes/Capir grangera.png', name: 'Grangera', price: 50 },
            { id: 'Imagenes/Capir H.png', name: 'H', price: 50 },
            { id: 'Imagenes/Capir Pirata.png', name: 'Pirata', price: 5 },
             { id: 'Imagenes/Capir vaquero.png', name: 'Vaquero', price: 5 }
        ];

        let totalCoins = parseInt(localStorage.getItem('gameCoins')) || 0;
        let currentSkin = localStorage.getItem('userSkin') || 'Imagenes/Capir con Sueter.png';
        
        // QUITADOS LOS PERSONAJES POR DEFECTO: El arreglo empieza completamente vacío []
        let unlockedSkins = JSON.parse(localStorage.getItem('unlockedSkins')) || [];

        let musicEnabled = localStorage.getItem('musicEnabled') !== 'false';
        let soundEnabled = localStorage.getItem('soundEnabled') !== 'false';

        const bgMusic = document.getElementById('bgMusic');
        const buySound = document.getElementById('buySound');

        function checkFirstTime() {
            // Si el arreglo está vacío, significa que es la primerísima vez que entra
            if (unlockedSkins.length === 0) {
                document.getElementById('welcome-screen').style.display = 'flex';
            } else {
                document.getElementById('selected-skin-img').src = currentSkin;
            }
        }

        function claimWelcomeSkin() {
            // Desbloquea y equipa automáticamente la primera skin gratuita
            unlockedSkins.push('Imagenes/Capir con Sueter.png');
            currentSkin = 'Imagenes/Capir con Sueter.png';
            
            localStorage.setItem('unlockedSkins', JSON.stringify(unlockedSkins));
            localStorage.setItem('userSkin', currentSkin);
            
            if (soundEnabled) {
                buySound.currentTime = 0;
                buySound.play();
            }

            document.getElementById('selected-skin-img').src = currentSkin;
            document.getElementById('welcome-screen').style.display = 'none';
            
            startMusic();
        }

        function initAudioSettings() {
            document.getElementById('musicSwitch').checked = musicEnabled;
            document.getElementById('soundSwitch').checked = soundEnabled;
        }

        function startMusic() {
            if (musicEnabled && bgMusic.paused && unlockedSkins.length > 0) {
                bgMusic.play().catch(e => console.log("Audio esperando interacción."));
            }
        }

        function toggleMusic() {
            musicEnabled = document.getElementById('musicSwitch').checked;
            localStorage.setItem('musicEnabled', musicEnabled);
            if (musicEnabled) { bgMusic.play(); } else { bgMusic.pause(); }
        }

        function toggleSound() {
            soundEnabled = document.getElementById('soundSwitch').checked;
            localStorage.setItem('soundEnabled', soundEnabled);
        }

        function updateCoinDisplay() {
            document.getElementById('menu-coins').innerText = totalCoins;
            localStorage.setItem('gameCoins', totalCoins);
        }

        function renderSkins() {
            const skinsContainer = document.getElementById('my-skins-container');
            skinsContainer.innerHTML = '';

            gameSkins.forEach(skin => {
                if (unlockedSkins.includes(skin.id)) {
                    const isEquipped = currentSkin === skin.id;
                    skinsContainer.innerHTML += `
                        <div class="col-6">
                            <div class="skin-card ${isEquipped ? 'equipped' : ''}">
                                <img src="${skin.id}" alt="${skin.name}">
                                <div class="small text-truncate w-100 text-center">${skin.name}</div>
                                <button class="btn ${isEquipped ? 'btn-success' : 'btn-outline-light'} btn-action-skin" 
                                    onclick="${isEquipped ? '' : `equipSkin('${skin.id}')`}">
                                    ${isEquipped ? 'EQUIPADO' : 'EQUIPAR'}
                                </button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function renderShop() {
            const shopContainer = document.getElementById('shop-items-container');
            shopContainer.innerHTML = '';
            let itemsAvailable = 0;

            gameSkins.forEach(skin => {
                if (!unlockedSkins.includes(skin.id)) {
                    itemsAvailable++;
                    shopContainer.innerHTML += `
                        <div class="col-6">
                            <div class="skin-card">
                                <img src="${skin.id}" alt="${skin.name}">
                                <div class="small text-truncate w-100 text-center">${skin.name}</div>
                                <button class="btn btn-warning btn-action-skin" onclick="buySkin('${skin.id}', ${skin.price})">
                                    🪙 ${skin.price}
                                </button>
                            </div>
                        </div>
                    `;
                }
            });

            if(itemsAvailable === 0) {
                shopContainer.innerHTML = '<div class="col-12 text-center text-muted py-3 small">¡Compraste todos los trajes! 🎉</div>';
            }
        }

        function equipSkin(id) {
            currentSkin = id;
            localStorage.setItem('userSkin', currentSkin);
            document.getElementById('selected-skin-img').src = id;
            renderSkins();
            
            const modalEl = document.getElementById('skinsModal');
            bootstrap.Modal.getInstance(modalEl).hide();
        }

        function buySkin(id, price) {
            if (totalCoins >= price) {
                totalCoins -= price;
                unlockedSkins.push(id);
                localStorage.setItem('unlockedSkins', JSON.stringify(unlockedSkins));
                updateCoinDisplay();
                
                if (soundEnabled) {
                    buySound.currentTime = 0;
                    buySound.play();
                }

                const modalEl = document.getElementById('shopModal');
                bootstrap.Modal.getInstance(modalEl).hide();

                triggerUnlockAnimation(id);
            } else {
                showCustomAlert();
            }
        }

        function showCustomAlert() {
            const alertBox = document.getElementById('errorAlert');
            alertBox.classList.add('show');
            setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
        }

        function triggerUnlockAnimation(imgSrc) {
            document.getElementById('unlock-skin-img').src = imgSrc;
            document.getElementById('unlock-screen').style.display = 'flex';
        }

        function closeUnlockScreen() {
            document.getElementById('unlock-screen').style.display = 'none';
            const lastBought = unlockedSkins[unlockedSkins.length - 1];
            equipSkin(lastBought);
        }

        function goToGame() {
            localStorage.setItem('userSkin', currentSkin);
            window.location.href = 'Juego.Html'; 
        }

        window.addEventListener('click', startMusic, { once: true });
        window.addEventListener('touchstart', startMusic, { once: true });

        updateCoinDisplay();
        initAudioSettings();
        checkFirstTime(); // Lógica de arranque
    </script>
</body>
</html>
